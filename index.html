<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EliteCore AI Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%2338bdf8;stop-opacity:1' /><stop offset='100%' style='stop-color:%239b51e0;stop-opacity:1' /></linearGradient></defs><path d='M20,25 L80,25 L80,35 L35,35 L35,45 L70,45 L70,55 L35,55 L35,65 L80,65 L80,75 L20,75 Z' fill='url(%23g)'/><path d='M50,5 L95,27.5 L95,72.5 L50,95 L5,72.5 L5,27.5 Z' fill='none' stroke='url(%23g)' stroke-width='4'/></svg>">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  background:
    linear-gradient(rgba(5,10,25,0.85), rgba(5,10,25,0.85)),
    url("https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1600&q=80");
  background-size: cover;
  background-position: center;
  color: white;
  overflow: hidden;
}

#particles-bg {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
  width: 100%;
  height: 100%;
}

.sidebar {
  width: 68px;
  background: rgba(15, 23, 42, 0.75);
  backdrop-filter: blur(18px);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  border-right: 1px solid rgba(255,255,255,0.08);
  position: relative;
  z-index: 2;
  padding: 15px 0;
  transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
}

.sidebar.expanded {
  width: 260px;
}

.sidebar-top, .sidebar-bottom {
  display: flex;
  flex-direction: column;
  width: 100%;
}

.nav-item {
  display: flex;
  align-items: center;
  padding: 12px 22px;
  cursor: pointer;
  white-space: nowrap;
  color: #94a3b8;
  transition: 0.2s;
  border-radius: 0 25px 25px 0;
}

.nav-item:hover {
  background: rgba(255,255,255,0.05);
  color: #38bdf8;
}

.nav-icon {
  font-size: 20px;
  min-width: 24px;
  text-align: center;
}

.nav-text {
  margin-left: 20px;
  opacity: 0;
  transition: opacity 0.2s;
  font-size: 14px;
  pointer-events: none;
}

.sidebar.expanded .nav-text {
  opacity: 1;
}

.new-chat-btn {
  background: rgba(56, 189, 248, 0.1);
  color: #38bdf8 !important;
  margin-bottom: 20px;
}

.chat-list {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}

.history-label {
  padding: 10px 22px;
  font-size: 11px;
  text-transform: uppercase;
  color: #64748b;
  letter-spacing: 1px;
  display: none;
}

.sidebar.expanded .history-label {
  display: block;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  position: relative;
  z-index: 2;
}

.header {
  padding: 15px;
  background: rgba(15, 23, 42, 0.8);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
}

.chat {
  flex: 1;
  padding: 20px 20px 120px 20px; /* More padding for floating bar */
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 0;
  scroll-behavior: smooth;
}

.msg {
  max-width: 70%;
  padding: 12px;
  border-radius: 12px;
  animation: fade 0.2s ease-in;
  position: relative;
  display: flex;
  flex-direction: column;
}

.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: black;
}

.bot {
  align-self: flex-start;
  background: rgba(56,189,248,0.15);
  border: 1px solid rgba(56,189,248,0.3);
}

/* FLOATING INPUT BOX */
.input-area {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 800px;
  z-index: 10;
}

.input-box {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  background: rgba(30, 41, 59, 0.95);
  backdrop-filter: blur(20px);
  border-radius: 32px;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
  background: transparent;
  color: white;
  font-size: 16px;
}

.send-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: #38bdf8;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
  color: black;
  font-size: 18px;
}

.send-btn:hover {
  background: #7dd3fc;
  transform: scale(1.05);
}

.icon-btn {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  cursor: pointer;
  transition: 0.2s;
  color: #94a3b8;
}

.icon-btn:hover {
  background: rgba(255,255,255,0.1);
  color: white;
}

/* SETTINGS MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0; top: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(5px);
}

.modal-content {
  background: #1e293b;
  margin: 10% auto;
  padding: 25px;
  border: 1px solid rgba(56,189,248,0.3);
  width: 400px;
  border-radius: 16px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

.modal-header {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 20px;
  color: #38bdf8;
  display: flex;
  justify-content: space-between;
}

.close-modal { cursor: pointer; color: #64748b; }

.setting-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

@keyframes fade {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

.analyzing-container { display: flex; align-items: center; gap: 12px; padding: 5px; color: #94a3b8; font-size: 14px; }
.gemini-pulse {
  width: 14px; height: 14px;
  background: linear-gradient(135deg, #4285f4, #9b51e0, #81c995);
  border-radius: 50%;
  position: relative;
  animation: rotate-gradient 2s linear infinite;
}

@keyframes rotate-gradient { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>

<body>

<canvas id="particles-bg"></canvas>

<div class="sidebar">
  <div class="sidebar-top">
    <div class="nav-item" onclick="toggleSidebar()" style="color: white; font-weight: bold;">
      <div class="nav-icon">☰</div>
      <div class="nav-text">EliteCore AI</div>
    </div>
    
    <div class="nav-item new-chat-btn" onclick="startNewChat()">
      <div class="nav-icon">📝</div>
      <div class="nav-text">New Chat</div>
    </div>

    <div class="history-label">Recent</div>
    <div class="chat-list" id="chat-history-list"></div>
  </div>

  <div class="sidebar-bottom">
    <div class="nav-item" onclick="toggleSettings()">
      <div class="nav-icon">⚙️</div>
      <div class="nav-text">Settings</div>
    </div>
  </div>
</div>

<div class="main">
  <div class="header">
    <div>Dashboard</div>
    <div>EliteCore SaaS</div>
  </div>

  <div id="chat" class="chat"></div>

  <div class="input-area">
    <div class="input-box">
      <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageSelection()">
      <div class="icon-btn" onclick="document.getElementById('imageInput').click()">📎</div>
      
      <input id="input" placeholder="Ask EliteCore AI..." onkeypress="if(event.key === 'Enter') send()" />
      
      <button class="send-btn" onclick="send()">➤</button>
    </div>
    
    <div id="preview-container" style="display: none; padding: 10px; position: absolute; bottom: 70px; left: 0; background: rgba(15,23,42,0.9); border-radius: 12px; border: 1px solid #38bdf8;">
      <img id="image-preview" src="" style="max-width: 100px; border-radius: 8px;">
      <button onclick="clearImage()" style="position: absolute; top: -10px; right: -10px; background: red; color: white; border-radius: 50%; border: none; cursor: pointer; width: 20px; height: 20px;">×</button>
    </div>
  </div>
</div>

<div id="settingsModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <span>Settings</span>
      <span class="close-modal" onclick="toggleSettings()">×</span>
    </div>
    <div class="setting-row">
      <span>AI Model</span>
      <span style="color:#38bdf8">EliteCore v2.4</span>
    </div>
    <div class="setting-row">
      <span>Dark Mode</span>
      <span style="color:#22c55e">Enabled</span>
    </div>
    <div class="setting-row">
      <span>Account</span>
      <span style="color:#94a3b8">Pro Member</span>
    </div>
    <button onclick="toggleSettings()" style="margin-top:20px; width:100%; background:rgba(255,255,255,0.1); color:white; padding:10px; border-radius:8px; border:none; cursor:pointer;">Save Changes</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
let selectedFile = null;

window.addEventListener('DOMContentLoaded', () => {
    addMessage("Welcome to EliteCore AI! How can I help you today?", "bot");
});

function toggleSidebar() {
    const sidebar = document.querySelector('.sidebar');
    sidebar.classList.toggle('expanded');
}

function toggleSettings() {
    const modal = document.getElementById("settingsModal");
    modal.style.display = (modal.style.display === "block") ? "none" : "block";
}

function startNewChat() {
    chat.innerHTML = "";
    addMessage("Started a fresh conversation. What's on your mind?", "bot");
}

function addMessage(text, type) {
    const div = document.createElement("div");
    div.classList.add("msg", type);
    const textSpan = document.createElement("span");
    textSpan.innerHTML = typeof marked !== 'undefined' ? marked.parse(text) : text;
    div.appendChild(textSpan);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function showAnalyzing() {
    const div = document.createElement("div");
    div.id = "analyzing-bubble";
    div.classList.add("msg", "bot");
    div.innerHTML = `<div class="analyzing-container"><div class="gemini-pulse"></div><span>Analyzing...</span></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function removeAnalyzing() {
    const loader = document.getElementById("analyzing-bubble");
    if (loader) loader.remove();
}

function handleImageSelection() {
    const fileInput = document.getElementById('imageInput');
    selectedFile = fileInput.files[0];
    if (selectedFile) {
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('image-preview').src = e.target.result;
            document.getElementById('preview-container').style.display = "block";
        };
        reader.readAsDataURL(selectedFile);
    }
}

function clearImage() {
    selectedFile = null;
    document.getElementById('imageInput').value = "";
    document.getElementById('preview-container').style.display = "none";
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value;
    if (!text && !selectedFile) return;

    addMessage(text || "Analyzing image...", "user");
    input.value = "";
    showAnalyzing();

    let base64Image = null;
    if (selectedFile) {
        const reader = new FileReader();
        base64Image = await new Promise((r) => {
            reader.onload = () => r(reader.result);
            reader.readAsDataURL(selectedFile);
        });
    }

    try {
        const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text, image: base64Image })
        });
        const data = await res.json();
        removeAnalyzing();
        addMessage(data.reply, "bot");
    } catch (err) {
        removeAnalyzing();
        addMessage("Connection error.", "bot");
    }
    clearImage();
}
</script>

</body>
</html>
