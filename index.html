<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EliteCore AI Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%2338bdf8;stop-opacity:1' /><stop offset='100%' style='stop-color:%239b51e0;stop-opacity:1' /></linearGradient></defs><path d='M20,25 L80,25 L80,35 L35,35 L35,45 L70,45 L70,55 L35,55 L35,65 L80,65 L80,75 L20,75 Z' fill='url(%23g)'/><path d='M50,5 L95,27.5 L95,72.5 L50,95 L5,72.5 L5,27.5 Z' fill='none' stroke='url(%23g)' stroke-width='4'/></svg>">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  background:
    linear-gradient(rgba(5,10,25,0.85), rgba(5,10,25,0.85)),
    url("https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1600&q=80");
  background-size: cover;
  background-position: center;
  color: white;
  overflow: hidden;
}

/* PARTICLES */
#particles-bg {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
  width: 100%;
  height: 100%;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 260px;
  background: rgba(15, 23, 42, 0.75);
  backdrop-filter: blur(18px);
  display: flex;
  flex-direction: column;
  border-right: 1px solid rgba(255,255,255,0.08);
  position: relative;
  z-index: 2;
  padding: 15px;
}

.logo {
  padding: 18px 12px;
  font-size: 18px;
  font-weight: bold;
}

.new-chat {
  margin: 10px 0 15px 0;
  padding: 12px;
  background: #38bdf8;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  color: black;
}

/* CHAT LIST */
.chat-list {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto;
}

.chat-item {
  padding: 12px 14px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chat-item:hover {
  background: rgba(56,189,248,0.15);
  transform: translateX(4px);
}

/* MAIN FIXED LAYOUT */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  position: relative;
  z-index: 2;
}

/* HEADER */
.header {
  padding: 15px;
  background: rgba(15, 23, 42, 0.8);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
}

/* CHAT AREA FIX */
.chat {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 0;
  scroll-behavior: smooth;
}

/* MESSAGES */
.msg {
  max-width: 70%;
  padding: 12px;
  border-radius: 12px;
  animation: fade 0.2s ease-in;
  position: relative;
  display: flex;
  flex-direction: column;
}

.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: black;
}

.bot {
  align-self: flex-start;
  background: rgba(56,189,248,0.15);
  border: 1px solid rgba(56,189,248,0.3);
}

.copy-btn {
  align-self: flex-end;
  margin-top: 8px;
  padding: 4px 10px;
  font-size: 11px;
  background: rgba(255, 255, 255, 0.1);
  color: #ffffff;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.copy-btn:hover {
  background: rgba(255, 255, 255, 0.2);
  border-color: #38bdf8;
}

.edit-btn {
  align-self: flex-end;
  margin-top: 5px;
  padding: 3px 8px;
  font-size: 10px;
  background: rgba(0, 0, 0, 0.3);
  color: #ffffff;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 4px;
  cursor: pointer;
  opacity: 0.8;
  transition: all 0.2s ease;
}

.edit-btn:hover {
  opacity: 1;
  background: rgba(0, 0, 0, 0.5);
  border-color: #fbbf24;
}

/* INPUT AREA FIXED */
.input-box {
  display: flex;
  flex-direction: column;
  padding: 12px;
  border-top: 1px solid rgba(255,255,255,0.05);
  background: rgba(15, 23, 42, 0.95);
  flex-shrink: 0;
}

.input-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
}

/* PREVIEW BOX */
#preview-container {
  display: none; 
  padding: 10px; 
  position: relative; 
  width: fit-content;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  margin-bottom: 10px;
}

/* INPUT */
input[type="text"] {
  flex: 1;
  min-width: 0;
  padding: 12px;
  border: none;
  border-radius: 10px;
  outline: none;
  background: rgba(255,255,255,0.05);
  color: white;
}

/* BUTTON */
.send-btn {
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  cursor: pointer;
  font-weight: bold;
  color: black;
  transition: 0.2s;
}

/* ICON BAR */
.action-bar {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 10px;
}

.icon-btn {
  width: 35px;
  height: 35px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(56,189,248,0.2);
  cursor: pointer;
  transition: 0.25s;
  font-size: 14px;
}

.icon-btn:hover {
  transform: scale(1.1);
  background: rgba(56,189,248,0.2);
}

/* ANIMATION */
@keyframes fade {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* THE ANALYZING ANIMATION */
.analyzing-container {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 5px;
    color: #94a3b8;
    font-size: 14px;
}

.gemini-pulse {
    width: 14px;
    height: 14px;
    background: linear-gradient(135deg, #4285f4, #9b51e0, #81c995);
    border-radius: 50%;
    position: relative;
    animation: rotate-gradient 2s linear infinite;
}

.gemini-pulse::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 50%;
    background: inherit;
    animation: pulse-bloom 1.5s ease-out infinite;
}

@keyframes rotate-gradient {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes pulse-bloom {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(2.5); opacity: 0; }
}
</style>
</head>

<body>

<canvas id="particles-bg"></canvas>

<div class="sidebar">
  <div class="logo">🤖 EliteCore AI</div>
  <button class="new-chat" onclick="startNewChat()">+ New Chat</button>

  <div class="chat-list" id="chat-history-list">
    </div>
</div>

<div class="main">
  <div class="header">
    <div>Dashboard</div>
    <div>EliteCore SaaS</div>
  </div>

  <div id="chat" class="chat"></div>

  <div class="input-box">
    <div id="preview-container">
        <img id="image-preview" src="" style="max-width: 120px; border-radius: 8px; border: 2px solid #38bdf8;">
        <button onclick="clearImage()" style="position: absolute; top: -5px; right: -5px; background: #ff4444; color: white; border-radius: 50%; border: none; cursor: pointer; width: 22px; height: 22px; font-weight: bold;">×</button>
    </div>

    <div class="input-controls">
        <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageSelection()">
        <div class="icon-btn" onclick="document.getElementById('imageInput').click()">📎</div>
        
        <input type="text" id="input" placeholder="Ask EliteCore AI..." onkeypress="if(event.key === 'Enter') send()" />
        <button class="send-btn" onclick="send()">Send</button>
    </div>

    <div class="action-bar">
      <div class="icon-btn" onclick="document.getElementById('imageInput').click()">🖼</div>
      <div class="icon-btn">🎤</div>
      <div class="icon-btn">✨</div>
    </div>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
let selectedFile = null;

// Initialization
window.addEventListener('DOMContentLoaded', () => {
    renderHistory();
    if (chat.children.length === 0) {
        addMessage("Welcome to EliteCore AI! How can I help you today?", "bot");
    }
});

// History Logic
function startNewChat() {
    if (chat.children.length > 1) {
        saveChatToHistory();
    }
    chat.innerHTML = "";
    addMessage("Started a fresh conversation. What's on your mind?", "bot");
}

function saveChatToHistory() {
    const messages = chat.innerHTML;
    if (!messages.trim()) return;

    let history = JSON.parse(localStorage.getItem("elitecore_history") || "[]");
    
    // Create a title from the first user message
    const firstUserMsg = Array.from(document.querySelectorAll(".msg.user")).shift();
    const title = firstUserMsg ? firstUserMsg.innerText.replace("Edit", "").substring(0, 25) + "..." : "New Chat " + new Date().toLocaleTimeString();

    const newEntry = {
        id: Date.now(),
        title: title,
        html: messages
    };

    history.unshift(newEntry);
    localStorage.setItem("elitecore_history", JSON.stringify(history.slice(0, 15)));
    renderHistory();
}

function renderHistory() {
    const list = document.getElementById("chat-history-list");
    const history = JSON.parse(localStorage.getItem("elitecore_history") || "[]");
    
    if (history.length === 0) {
        list.innerHTML = '<div style="color: #64748b; font-size: 12px; padding: 10px;">No recent chats</div>';
        return;
    }

    list.innerHTML = history.map(item => `
        <div class="chat-item" onclick="loadChat(${item.id})">
            ${item.title}
        </div>
    `).join('');
}

function loadChat(id) {
    const history = JSON.parse(localStorage.getItem("elitecore_history") || "[]");
    const chatEntry = history.find(item => item.id === id);
    if (chatEntry) {
        chat.innerHTML = chatEntry.html;
        // Re-attach event listeners to new buttons if necessary
        chat.scrollTop = chat.scrollHeight;
    }
}

// UI Functions
function showAnalyzing() {
    const div = document.createElement("div");
    div.id = "analyzing-bubble";
    div.classList.add("msg", "bot");
    div.innerHTML = `
        <div class="analyzing-container">
            <div class="gemini-pulse"></div>
            <span>Analyzing...</span>
        </div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function removeAnalyzing() {
    const loader = document.getElementById("analyzing-bubble");
    if (loader) loader.remove();
}

function addMessage(text, type) {
    const div = document.createElement("div");
    div.classList.add("msg", type);
    
    const textSpan = document.createElement("span");
    // Only parse markdown if 'marked' is available
    textSpan.innerHTML = typeof marked !== 'undefined' ? marked.parse(text) : text;
    div.appendChild(textSpan);

    if (type === "bot") {
        const copyBtn = document.createElement("button");
        copyBtn.innerText = "Copy";
        copyBtn.className = "copy-btn";
        copyBtn.onclick = () => {
            const cleanText = textSpan.innerText;
            navigator.clipboard.writeText(cleanText).then(() => {
                copyBtn.innerText = "Copied!";
                setTimeout(() => copyBtn.innerText = "Copy", 2000);
            });
        };
        div.appendChild(copyBtn);
    } else if (type === "user") {
        const editBtn = document.createElement("button");
        editBtn.innerText = "Edit";
        editBtn.className = "edit-btn";
        editBtn.onclick = () => {
            const inputField = document.getElementById("input"); 
            inputField.value = text;
            inputField.focus();
        };
        div.appendChild(editBtn);
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// Image Handling
function handleImageSelection() {
    const fileInput = document.getElementById('imageInput');
    const previewContainer = document.getElementById('preview-container');
    const previewImg = document.getElementById('image-preview');
    
    selectedFile = fileInput.files[0];
    
    if (selectedFile) {
        const reader = new FileReader();
        reader.onload = (e) => {
            previewImg.src = e.target.result;
            previewContainer.style.display = "block";
        };
        reader.readAsDataURL(selectedFile);
    }
}

function clearImage() {
    selectedFile = null;
    document.getElementById('imageInput').value = "";
    document.getElementById('preview-container').style.display = "none";
}

// Sending Logic
async function send() {
    const input = document.getElementById("input");
    const text = input.value;
    const file = selectedFile; 
    
    if (!text && !file) return;

    // 1. Add user message to UI
    addMessage(text || "Analyzing uploaded image...", "user");
    input.value = "";

    // 2. Show indicator
    showAnalyzing();

    // 3. Process Image
    let base64Image = null;
    if (file) {
        const reader = new FileReader();
        base64Image = await new Promise((resolve) => {
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(file);
        });
    }

    try {
        // 4. Send the request
        const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                message: text,
                image: base64Image 
            })
        });

        const data = await res.json();
        removeAnalyzing(); 
        addMessage(data.reply, "bot");

    } catch (err) {
        removeAnalyzing();
        addMessage("Connection error. Is the server running?", "bot");
    }

    clearImage();
}
</script>

</body>
</html>
