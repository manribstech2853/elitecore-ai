<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EliteCore AI Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  background:
    linear-gradient(rgba(5,10,25,0.85), rgba(5,10,25,0.85)),
    url("https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1600&q=80");
  background-size: cover;
  background-position: center;
  color: white;
  overflow: hidden;
}

/* PARTICLES */
#particles-bg {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
  width: 100%;
  height: 100%;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 260px;
  background: rgba(15, 23, 42, 0.75);
  backdrop-filter: blur(18px);
  display: flex;
  flex-direction: column;
  border-right: 1px solid rgba(255,255,255,0.08);
  position: relative;
  z-index: 2;
  padding: 15px;
}

.logo {
  padding: 18px 12px;
  font-size: 18px;
  font-weight: bold;
}

.new-chat {
  margin: 10px 0 15px 0;
  padding: 12px;
  background: #38bdf8;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

/* CHAT LIST */
.chat-list {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.chat-item {
  padding: 12px 14px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.chat-item:hover {
  background: rgba(56,189,248,0.15);
  transform: translateX(4px);
}

/* MAIN FIXED LAYOUT */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  position: relative;
  z-index: 2;
}

/* HEADER */
.header {
  padding: 15px;
  background: rgba(15, 23, 42, 0.8);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
}

/* CHAT AREA FIX */
.chat {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 0;
  scroll-behavior: smooth;
}

/* MESSAGES */
.msg {
  max-width: 70%;
  padding: 12px;
  border-radius: 12px;
  animation: fade 0.2s ease-in;
}

.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: black;
}

.bot {
  align-self: flex-start;
  background: rgba(56,189,248,0.15);
  border: 1px solid rgba(56,189,248,0.3);
}
/* COPY BUTTON STYLES */
.msg {
    position: relative;
    display: flex;
    flex-direction: column;
}

.copy-btn {
    align-self: flex-end;
    margin-top: 8px;
    padding: 4px 10px;
    font-size: 11px;
    background: rgba(255, 255, 255, 0.1);
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
}

.copy-btn:hover {
    background: rgba(255, 255, 255, 0.2);
    border-color: #38bdf8; /* This adds a nice blue highlight on hover */
}

.copy-btn:active {
    transform: scale(0.95);
}

/* EDIT BUTTON STYLES */
.edit-btn {
    align-self: flex-end;
    margin-top: 5px;
    padding: 3px 8px;
    font-size: 10px;
    background: rgba(0, 0, 0, 0.3); /* Slightly darker to distinguish from copy */
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 4px;
    cursor: pointer;
    opacity: 0.8;
    transition: all 0.2s ease;
}

.edit-btn:hover {
    opacity: 1;
    background: rgba(0, 0, 0, 0.5);
    border-color: #fbbf24; /* A nice amber/yellow glow for editing */
}
/* INPUT AREA FIXED */
.input-box {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  border-top: 1px solid rgba(255,255,255,0.05);
  background: rgba(15, 23, 42, 0.95);
  flex-shrink: 0;
}

/* INPUT */
input {
  flex: 1;
  min-width: 0;
  padding: 12px;
  border: none;
  border-radius: 10px;
  outline: none;
  background: rgba(255,255,255,0.05);
  color: white;
}

/* BUTTON */
button {
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  cursor: pointer;
  font-weight: bold;
  color: black;
  transition: 0.2s;
}

button:hover {
  background: #0ea5e9;
}

/* ICON BAR */
.action-bar {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}

.icon-btn {
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(56,189,248,0.2);
  cursor: pointer;
  transition: 0.25s;
}

.icon-btn:hover {
  transform: scale(1.15) rotate(5deg);
  box-shadow: 0 0 15px rgba(56,189,248,0.6);
}

/* ANIMATION */
@keyframes fade {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .sidebar { display: none; }

  .msg { max-width: 90%; }

  .input-box {
    flex-wrap: wrap;
  }

  .action-bar {
    width: 100%;
    justify-content: center;
  }
}
/* THE ANALYZING ANIMATION */
.analyzing-container {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 5px;
    color: #94a3b8;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
}

.gemini-pulse {
    width: 14px;
    height: 14px;
    background: linear-gradient(135deg, #4285f4, #9b51e0, #81c995);
    border-radius: 50%;
    position: relative;
    animation: rotate-gradient 2s linear infinite;
}

.gemini-pulse::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 50%;
    background: inherit;
    animation: pulse-bloom 1.5s ease-out infinite;
}

@keyframes rotate-gradient {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes pulse-bloom {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(2.5); opacity: 0; }
}

</style>
</head>

<body>

<canvas id="particles-bg"></canvas>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">🤖 EliteCore AI</div>
  <button class="new-chat">+ New Chat</button>

  <div class="chat-list">
    <div class="chat-item">General Chat</div>
    <div class="chat-item">Business Ideas</div>
    <div class="chat-item">EliteCore Info</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <div>Dashboard</div>
    <div>EliteCore SaaS</div>
  </div>

  <div id="chat" class="chat"></div>


  <!-- INPUT -->
  <div class="input-box">
    <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageSelection()">
    <div id="preview-container" style="display: none; padding: 10px; position: relative; width: fit-content;">
    <img id="image-preview" src="" style="max-width: 150px; border-radius: 8px; border: 2px solid #007bff;">
    <button onclick="clearImage()" style="position: absolute; top: 0; right: 0; background: red; color: white; border-radius: 50%; border: none; cursor: pointer; width: 25px; height: 25px;">×</button>
</div>
<div class="icon-btn" onclick="document.getElementById('imageInput').click()">📎</div>
    <input id="input" placeholder="Ask EliteCore AI..." />
    <button onclick="send()">Send</button>

    <div class="action-bar">
      <div class="icon-btn">📎</div>
      <div class="icon-btn">🎤</div>
      <div class="icon-btn">🖼</div>
      <div class="icon-btn">✨</div>
    </div>
  </div>

</div>

<script>
const chat = document.getElementById("chat");


    window.addEventListener('DOMContentLoaded', () => {
        addMessage("Welcome to EliteCore AI! How can I help you today?", "bot");
    });

// Function to show the "Analyzing" state
function showAnalyzing() {
    const div = document.createElement("div");
    div.id = "analyzing-bubble";
    div.classList.add("msg", "bot");
    
    div.innerHTML = `
        <div class="analyzing-container">
            <div class="gemini-pulse"></div>
            <span>Analyzing...</span>
        </div>
    `;
    
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// Function to remove it when the response arrives
function removeAnalyzing() {
    const loader = document.getElementById("analyzing-bubble");
    if (loader) loader.remove();
}

    function addMessage(text, type) {
    const div = document.createElement("div");
    div.classList.add("msg", type);
    
    const textSpan = document.createElement("span");
    textSpan.innerHTML = marked.parse(text);
    div.appendChild(textSpan);

    if (type === "bot") {
        // Copy button for the bot
        const copyBtn = document.createElement("button");
        copyBtn.innerText = "Copy";
        copyBtn.className = "copy-btn";
        copyBtn.onclick = () => {
            navigator.clipboard.writeText(text).then(() => {
                copyBtn.innerText = "Copied!";
                setTimeout(() => copyBtn.innerText = "Copy", 2000);
            });
        };
        div.appendChild(copyBtn);
    } else if (type === "user") {
        // Edit button for the user
        const editBtn = document.createElement("button");
        editBtn.innerText = "Edit";
        editBtn.className = "edit-btn";
        editBtn.onclick = () => {
            // This grabs your input field and puts the text back in
            const inputField = document.getElementById("input"); 
            inputField.value = text;
            inputField.focus();
            
            // Optional: Scroll to the input box so the user sees it
            inputField.scrollIntoView({ behavior: 'smooth' });
        };
        div.appendChild(editBtn);
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}
    

   // Variable to track the current selected file
let selectedFile = null;

// Function to handle image selection and preview
function handleImageSelection() {
    const fileInput = document.getElementById('imageInput');
    selectedFile = fileInput.files[0];
    
    if (selectedFile) {
        // You can add a small UI alert or icon change here to show a file is ready
        console.log("File selected:", selectedFile.name);
    }
}

// Function to clear the image if the user changes their mind
function clearImage() {
    selectedFile = null;
    document.getElementById('imageInput').value = "";
    console.log("Image cleared");
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value;
    
    // Use the selectedFile variable we tracked earlier
    const file = selectedFile; 
    
    if (!text && !file) return;

    // 1. Add user message to UI
    addMessage(text || "Analyzing uploaded image...", "user");
    input.value = "";

    // 2. UPDATED: Show the animated Gemini-style indicator
    // This replaces the manual thinkingDiv creation
    showAnalyzing();

    // 3. Convert image to Base64 using FileReader API
    let base64Image = null;
    if (file) {
        const reader = new FileReader();
        base64Image = await new Promise((resolve) => {
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(file);
        });
    }

    try {
        // 4. Send the request
        const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                message: text,
                image: base64Image 
            })
        });

        const data = await res.json();

        // 5. UPDATED: Remove indicator using the helper function
        removeAnalyzing(); 
        addMessage(data.reply, "bot");

    } catch (err) {
        // UPDATED: Ensure it is removed if an error occurs
        removeAnalyzing();
        addMessage("Connection error. Is the server running?", "bot");
    }

    // 6. Reset the file state for the next message
    clearImage();
}

</script>

</body>
</html>
