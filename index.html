<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EliteCore AI Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%2338bdf8;stop-opacity:1' /><stop offset='100%' style='stop-color:%239b51e0;stop-opacity:1' /></linearGradient></defs><path d='M20,25 L80,25 L80,35 L35,35 L35,45 L70,45 L70,55 L35,55 L35,65 L80,65 L80,75 L20,75 Z' fill='url(%23g)'/><path d='M50,5 L95,27.5 L95,72.5 L50,95 L5,72.5 L5,27.5 Z' fill='none' stroke='url(%23g)' stroke-width='4'/></svg>">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  background: #0f172a;
  color: white;
  overflow: hidden;
}

/* ===== UPDATED GEMINI SIDEBAR ===== */
.sidebar {
  width: 68px; /* Slim by default */
  background: #1e293b;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 12px 0;
  transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 10;
  border-right: 1px solid rgba(255,255,255,0.05);
}

.sidebar:hover {
  width: 260px; /* Expands on hover */
}

.sidebar-top, .sidebar-bottom {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
}

.nav-item {
  display: flex;
  align-items: center;
  padding: 12px 22px;
  cursor: pointer;
  white-space: nowrap;
  color: #94a3b8;
  transition: 0.2s;
  border-radius: 0 25px 25px 0;
  margin-right: 10px;
}

.nav-item:hover {
  background: rgba(255,255,255,0.05);
  color: white;
}

.nav-icon {
  font-size: 20px;
  min-width: 24px;
  text-align: center;
}

.nav-text {
  margin-left: 20px;
  opacity: 0;
  transition: opacity 0.2s;
  font-size: 14px;
  font-weight: 500;
}

.sidebar:hover .nav-text {
  opacity: 1;
}

/* Special New Chat Button */
.nav-item.new-chat-btn {
  background: rgba(56, 189, 248, 0.1);
  color: #38bdf8;
  margin-bottom: 10px;
}

/* History Container */
.chat-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  margin-top: 10px;
}

.history-label {
  padding: 10px 22px;
  font-size: 11px;
  text-transform: uppercase;
  color: #64748b;
  letter-spacing: 1px;
  display: none;
}

.sidebar:hover .history-label {
  display: block;
}

/* MAIN LAYOUT */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: #0f172a;
}

.chat {
  flex: 1;
  padding: 40px 15%; /* Centered chat look */
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* INPUT SECTION */
.input-container {
  padding: 20px 15%;
  background: #0f172a;
}

.input-box {
  background: #1e293b;
  border-radius: 28px;
  padding: 10px 20px;
  display: flex;
  flex-direction: column;
  border: 1px solid rgba(255,255,255,0.1);
}

.input-row {
  display: flex;
  align-items: center;
  gap: 15px;
}

input[type="text"] {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: white;
  padding: 12px 0;
  font-size: 16px;
}

.icon-btn {
  background: transparent;
  border: none;
  color: #94a3b8;
  cursor: pointer;
  font-size: 20px;
  padding: 8px;
  border-radius: 50%;
  transition: 0.2s;
}

.icon-btn:hover {
  background: rgba(255,255,255,0.05);
  color: #38bdf8;
}

/* MESSAGE BUBBLES */
.msg { max-width: 85%; line-height: 1.6; }
.user { align-self: flex-end; background: #2d3748; padding: 12px 20px; border-radius: 18px; }
.bot { align-self: flex-start; width: 100%; }

/* ANALYZING ANIMATION */
.gemini-pulse {
  width: 16px; height: 16px;
  background: linear-gradient(135deg, #4285f4, #9b51e0, #81c995);
  border-radius: 50%;
  animation: rotate-gradient 2s linear infinite;
}
@keyframes rotate-gradient { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</style>
</head>

<body>

<div class="sidebar">
  <div class="sidebar-top">
    <div class="nav-item">
      <div class="nav-icon">☰</div>
      <div class="nav-text">EliteCore AI</div>
    </div>
    
    <div class="nav-item new-chat-btn" onclick="startNewChat()">
      <div class="nav-icon">📝</div>
      <div class="nav-text">New Chat</div>
    </div>

    <div class="history-label">Recent</div>
    <div class="chat-list" id="chat-history-list">
      </div>
  </div>

  <div class="sidebar-bottom">
    <div class="nav-item">
      <div class="nav-icon">❓</div>
      <div class="nav-text">Help</div>
    </div>
    <div class="nav-item" onclick="alert('Settings feature active soon!')">
      <div class="nav-icon">⚙️</div>
      <div class="nav-text">Settings</div>
    </div>
  </div>
</div>

<div class="main">
  <div class="chat" id="chat"></div>

  <div class="input-container">
    <div id="preview-container" style="display:none; margin-bottom:10px;">
        <img id="image-preview" src="" style="max-width: 100px; border-radius: 12px;">
    </div>
    
    <div class="input-box">
      <div class="input-row">
        <input type="text" id="input" placeholder="Enter a prompt here" onkeypress="if(event.key === 'Enter') send()">
        
        <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageSelection()">
        <button class="icon-btn" onclick="document.getElementById('imageInput').click()">🖼️</button>
        <button class="icon-btn" onclick="send()">➔</button>
      </div>
    </div>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
let selectedFile = null;

// Initialization
window.addEventListener('DOMContentLoaded', () => {
    renderHistory();
    if (chat.children.length === 0) {
        addMessage("Hello! I'm EliteCore. How can I help you today?", "bot");
    }
});

function startNewChat() {
    if (chat.children.length > 1) saveChatToHistory();
    chat.innerHTML = "";
    addMessage("Started a fresh conversation.", "bot");
}

function saveChatToHistory() {
    let history = JSON.parse(localStorage.getItem("elitecore_history") || "[]");
    const firstUserMsg = document.querySelector(".msg.user");
    const title = firstUserMsg ? firstUserMsg.innerText.substring(0, 20) + "..." : "Chat " + new Date().toLocaleTimeString();
    
    history.unshift({ id: Date.now(), title, html: chat.innerHTML });
    localStorage.setItem("elitecore_history", JSON.stringify(history.slice(0, 10)));
    renderHistory();
}

function renderHistory() {
    const list = document.getElementById("chat-history-list");
    const history = JSON.parse(localStorage.getItem("elitecore_history") || "[]");
    list.innerHTML = history.map(item => `
        <div class="nav-item" onclick="loadChat(${item.id})">
            <div class="nav-icon">💬</div>
            <div class="nav-text">${item.title}</div>
        </div>
    `).join('');
}

function loadChat(id) {
    const history = JSON.parse(localStorage.getItem("elitecore_history") || "[]");
    const item = history.find(i => i.id === id);
    if (item) chat.innerHTML = item.html;
}

function addMessage(text, type) {
    const div = document.createElement("div");
    div.classList.add("msg", type);
    div.innerHTML = `<div>${typeof marked !== 'undefined' ? marked.parse(text) : text}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function showAnalyzing() {
    const div = document.createElement("div");
    div.id = "analyzing-bubble";
    div.classList.add("msg", "bot");
    div.innerHTML = `<div style="display:flex;align-items:center;gap:10px;"><div class="gemini-pulse"></div><span>EliteCore is thinking...</span></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value;
    if (!text && !selectedFile) return;

    addMessage(text || "Analyzing image...", "user");
    input.value = "";
    showAnalyzing();

    let base64Image = null;
    if (selectedFile) {
        base64Image = await new Promise(r => {
            const rd = new FileReader();
            rd.onload = () => r(rd.result);
            rd.readAsDataURL(selectedFile);
        });
    }

    try {
        const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text, image: base64Image })
        });
        const data = await res.json();
        document.getElementById("analyzing-bubble").remove();
        addMessage(data.reply, "bot");
    } catch (e) {
        document.getElementById("analyzing-bubble").remove();
        addMessage("Error connecting to server.", "bot");
    }
    selectedFile = null;
    document.getElementById("preview-container").style.display = "none";
}

function handleImageSelection() {
    selectedFile = document.getElementById('imageInput').files[0];
    if (selectedFile) {
        const rd = new FileReader();
        rd.onload = (e) => {
            document.getElementById('image-preview').src = e.target.result;
            document.getElementById('preview-container').style.display = "block";
        };
        rd.readAsDataURL(selectedFile);
    }
}
</script>
</body>
</html>
