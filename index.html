<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EliteCore AI Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%2338bdf8;stop-opacity:1' /><stop offset='100%' style='stop-color:%239b51e0;stop-opacity:1' /></linearGradient></defs><path d='M20,25 L80,25 L80,35 L35,35 L35,45 L70,45 L70,55 L35,55 L35,65 L80,65 L80,75 L20,75 Z' fill='url(%23g)'/><path d='M50,5 L95,27.5 L95,72.5 L50,95 L5,72.5 L5,27.5 Z' fill='none' stroke='url(%23g)' stroke-width='4'/></svg>">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  background:
    linear-gradient(rgba(5,10,25,0.85), rgba(5,10,25,0.85)),
    url("https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1600&q=80");
  background-size: cover;
  background-position: center;
  color: white;
  overflow: hidden;
}

/* PARTICLES */
#particles-bg {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
  width: 100%;
  height: 100%;
}

.sidebar {
  width: 68px; /* Slim by default */
  background: rgba(15, 23, 42, 0.75);
  backdrop-filter: blur(18px);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  border-right: 1px solid rgba(255,255,255,0.08);
  position: relative;
  z-index: 2;
  padding: 15px 0;
  /* Keeps the smooth expansion animation */
  transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
}

/* Replace .sidebar:hover with this class */
.sidebar.expanded {
  width: 260px;
}


.sidebar-top, .sidebar-bottom {
  display: flex;
  flex-direction: column;
  width: 100%;
}

.nav-item {
  display: flex;
  align-items: center;
  padding: 12px 22px;
  cursor: pointer;
  white-space: nowrap;
  color: #94a3b8;
  transition: 0.2s;
  border-radius: 0 25px 25px 0;
}

.nav-item:hover {
  background: rgba(255,255,255,0.05);
  color: #38bdf8;
}

.nav-icon {
  font-size: 20px;
  min-width: 24px;
  text-align: center;
}

.nav-text {
  margin-left: 20px;
  opacity: 0;
  transition: opacity 0.2s;
  font-size: 14px;
}

.sidebar:hover .nav-text {
  opacity: 1;
}

/* New Chat Styling */
.new-chat-btn {
  background: rgba(56, 189, 248, 0.1);
  color: #38bdf8 !important;
  margin-bottom: 20px;
}

/* CHAT LIST (History) */
.chat-list {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}

.history-label {
  padding: 10px 22px;
  font-size: 11px;
  text-transform: uppercase;
  color: #64748b;
  letter-spacing: 1px;
  display: none;
}

.sidebar:hover .history-label {
  display: block;
}

/* MAIN FIXED LAYOUT */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  position: relative;
  z-index: 2;
}

/* HEADER */
.header {
  padding: 15px;
  background: rgba(15, 23, 42, 0.8);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
}

/* CHAT AREA */
.chat {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 0;
  scroll-behavior: smooth;
}

/* MESSAGES */
.msg {
  max-width: 70%;
  padding: 12px;
  border-radius: 12px;
  animation: fade 0.2s ease-in;
  position: relative;
  display: flex;
  flex-direction: column;
}

.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: black;
}

.bot {
  align-self: flex-start;
  background: rgba(56,189,248,0.15);
  border: 1px solid rgba(56,189,248,0.3);
}

.copy-btn, .edit-btn {
  align-self: flex-end;
  margin-top: 8px;
  padding: 4px 10px;
  font-size: 11px;
  background: rgba(255, 255, 255, 0.1);
  color: #ffffff;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.edit-btn { background: rgba(0, 0, 0, 0.3); font-size: 10px; }

/* INPUT AREA */
.input-box {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  border-top: 1px solid rgba(255,255,255,0.05);
  background: rgba(15, 23, 42, 0.95);
  flex-shrink: 0;
}

input {
  flex: 1;
  min-width: 0;
  padding: 12px;
  border: none;
  border-radius: 10px;
  outline: none;
  background: rgba(255,255,255,0.05);
  color: white;
}

button {
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  cursor: pointer;
  font-weight: bold;
  color: black;
  transition: 0.2s;
}

.action-bar { display: flex; gap: 8px; align-items: center; }

.icon-btn {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(56,189,248,0.2);
  cursor: pointer;
  transition: 0.25s;
}

/* ANIMATION */
@keyframes fade {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

.analyzing-container { display: flex; align-items: center; gap: 12px; padding: 5px; color: #94a3b8; font-size: 14px; }
.gemini-pulse {
  width: 14px; height: 14px;
  background: linear-gradient(135deg, #4285f4, #9b51e0, #81c995);
  border-radius: 50%;
  position: relative;
  animation: rotate-gradient 2s linear infinite;
}

@keyframes rotate-gradient { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>

<body>

<canvas id="particles-bg"></canvas>

<div class="sidebar">
  <div class="sidebar-top">
    <div class="nav-item" onclick="toggleSidebar()" style="color: white; font-weight: bold; cursor: pointer;"></div>
      <div class="nav-icon">☰</div>
      <div class="nav-text">EliteCore AI</div>
    </div>
    
    <div class="nav-item new-chat-btn" onclick="startNewChat()">
      <div class="nav-icon">📝</div>
      <div class="nav-text">New Chat</div>
    </div>

    <div class="history-label">Recent</div>
    <div class="chat-list" id="chat-history-list">
        </div>
  </div>

  <div class="sidebar-bottom">
    <div class="nav-item">
      <div class="nav-icon">❓</div>
      <div class="nav-text">Help</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">⚙️</div>
      <div class="nav-text">Settings</div>
    </div>
  </div>
</div>

<div class="main">
  <div class="header">
    <div>Dashboard</div>
    <div>EliteCore SaaS</div>
  </div>

  <div id="chat" class="chat"></div>

  <div class="input-box">
    <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageSelection()">
    <div id="preview-container" style="display: none; padding: 10px; position: relative; width: fit-content;">
      <img id="image-preview" src="" style="max-width: 150px; border-radius: 8px; border: 2px solid #007bff;">
      <button onclick="clearImage()" style="position: absolute; top: 0; right: 0; background: red; color: white; border-radius: 50%; border: none; cursor: pointer; width: 25px; height: 25px;">×</button>
    </div>
    <div class="icon-btn" onclick="document.getElementById('imageInput').click()">📎</div>
    <input id="input" placeholder="Ask EliteCore AI..." onkeypress="if(event.key === 'Enter') send()" />
    <button onclick="send()">Send</button>

    <div class="action-bar">
      <div class="icon-btn" onclick="document.getElementById('imageInput').click()">🖼️</div>
      <div class="icon-btn">🎤</div>
      <div class="icon-btn">✨</div>
    </div>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
let selectedFile = null;

window.addEventListener('DOMContentLoaded', () => {
    addMessage("Welcome to EliteCore AI! How can I help you today?", "bot");
});

function startNewChat() {
    chat.innerHTML = "";
    addMessage("Started a fresh conversation. What's on your mind?", "bot");
}

function addMessage(text, type) {
    const div = document.createElement("div");
    div.classList.add("msg", type);
    const textSpan = document.createElement("span");
    textSpan.innerHTML = typeof marked !== 'undefined' ? marked.parse(text) : text;
    div.appendChild(textSpan);

    if (type === "bot") {
        const copyBtn = document.createElement("button");
        copyBtn.innerText = "Copy";
        copyBtn.className = "copy-btn";
        copyBtn.onclick = () => {
            navigator.clipboard.writeText(text).then(() => {
                copyBtn.innerText = "Copied!";
                setTimeout(() => copyBtn.innerText = "Copy", 2000);
            });
        };
        div.appendChild(copyBtn);
    }
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function showAnalyzing() {
    const div = document.createElement("div");
    div.id = "analyzing-bubble";
    div.classList.add("msg", "bot");
    div.innerHTML = `<div class="analyzing-container"><div class="gemini-pulse"></div><span>Analyzing...</span></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function removeAnalyzing() {
    const loader = document.getElementById("analyzing-bubble");
    if (loader) loader.remove();
}

function handleImageSelection() {
    const fileInput = document.getElementById('imageInput');
    selectedFile = fileInput.files[0];
    if (selectedFile) {
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('image-preview').src = e.target.result;
            document.getElementById('preview-container').style.display = "block";
        };
        reader.readAsDataURL(selectedFile);
    }
}

function clearImage() {
    selectedFile = null;
    document.getElementById('imageInput').value = "";
    document.getElementById('preview-container').style.display = "none";
}

function toggleSidebar() {
    const sidebar = document.querySelector('.sidebar');
    sidebar.classList.toggle('expanded');
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value;
    if (!text && !selectedFile) return;

    addMessage(text || "Analyzing image...", "user");
    input.value = "";
    showAnalyzing();

    let base64Image = null;
    if (selectedFile) {
        const reader = new FileReader();
        base64Image = await new Promise((r) => {
            reader.onload = () => r(reader.result);
            reader.readAsDataURL(selectedFile);
        });
    }

    try {
        const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text, image: base64Image })
        });
        const data = await res.json();
        removeAnalyzing();
        addMessage(data.reply, "bot");
    } catch (err) {
        removeAnalyzing();
        addMessage("Connection error.", "bot");
    }
    clearImage();
}
</script>

</body>
</html>
